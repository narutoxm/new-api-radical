services:
  new-api-radical:
    image: ghcr.io/narutoxm/new-api-radical:latest
    container_name: new-api-radical
    restart: unless-stopped
    command: --log-dir /app/logs
    env_file:
      - .env
    volumes:
      - ./data:/data
      - ./logs:/app/logs
      - /var/run/mysqld:/var/run/mysqld:ro
    networks:
      - claude_code_hub
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  claude_code_hub:
    external: true
    name: claude-code-hub_default
